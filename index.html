<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1a0d">
  <title>HerculesOS</title>
  <link rel="stylesheet" href="css/styles.css">

  <!-- qrcode.js (ラベル用QRコード生成) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- Chart.js (体重推移グラフ) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <!-- ══════════════════════════════════════════════════════════
       jsQR (カメラQRスキャン用) — 多段フォールバックローダー
       
       最優先: js/lib/jsQR.min.js （ローカル同梱）
         取得: curl -L "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js" \
                    -o js/lib/jsQR.min.js
         または: https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js を
                 ブラウザで開いて js/lib/jsQR.min.js として保存

       フォールバック順: ローカル → jsDelivr → cdnjs → unpkg
       いずれかが成功すれば QR スキャンが動作します
       ════════════════════════════════════════════════════════════ -->
  <script>
    (function() {
      'use strict';
      var CDNS = [
        'js/lib/jsQR.min.js',                                                         // ① ローカル（最速・オフライン対応）
        'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js',                  // ② jsDelivr（GitHub CDN）
        'https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js',             // ③ cdnjs
        'https://unpkg.com/jsqr@1.4.0/dist/jsQR.min.js',                             // ④ unpkg
      ];
      var tried = 0;

      function tryNext() {
        if (tried >= CDNS.length) {
          console.error('[HerculesOS] jsQR: 全ての読込元で失敗しました。QRスキャン機能は使用できません。');
          window._jsQRLoadFailed = true;
          return;
        }
        var url = CDNS[tried++];
        var s = document.createElement('script');
        s.src = url;
        s.onload = function() {
          console.log('[HerculesOS] jsQR loaded from: ' + url);
          window._jsQRLoadFailed = false;
        };
        s.onerror = function() {
          console.warn('[HerculesOS] jsQR failed from: ' + url + '  → trying next...');
          tryNext();
        };
        document.head.appendChild(s);
      }

      tryNext();
    })();
  </script>
</head>
<body>

<div id="app">

  <!-- ════ メインコンテンツ ════ -->
  <main id="main">
    <!-- 各ページがここに動的レンダリングされる -->

    </button>
    <button class="nav-tab" data-nav="qr-scan">

    </button>
    <button class="nav-tab" data-nav="ind-list">

    </button>
    <button class="nav-tab" data-nav="manage">

    </button>
    <button class="nav-tab" data-nav="settings">

    </button>
  </nav>

</div><!-- /#app -->
