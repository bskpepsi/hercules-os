  <!-- jsQR (カメラQRスキャン用) — CDN優先ロード -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"
    onerror="(function(){var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';s.onerror=function(){var s2=document.createElement('script');s2.src='js/vendor/jsQR.min.js';document.head.appendChild(s2);};document.head.appendChild(s);})()">
  </script>
</head>

<div id="app">

  <!-- ════ メインコンテンツ ════ -->

    </div>

    <button class="nav-tab" data-nav="manage">

    </button>
    <button class="nav-tab" data-nav="settings">

</div><!-- /#app -->
