  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1a0d">
  <!-- [20260424j] 🔥 キャッシュ強制無効化 (Android Chrome 対策)
       症状: Android Chrome が index.html を強くキャッシュし、?v=YYYYMMDD の
             バージョン更新が反映されない (PC は OK だがスマホで古い JS を
             読み続ける)。
       対策: HTTP キャッシュを完全に無効化する meta タグ3種を追加。これで
             index.html は毎回最新が取得され、子ファイルの ?v= も最新を参照。
       備考: GitHub Pages は静的配信でサーバー側 Cache-Control を制御できない
             ため、meta http-equiv で対処するのが現実解。 -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>HerculesOS</title>
  <link rel="stylesheet" href="css/styles.css?v=20260423a">

  <!-- qrcode.js (ラベル用QRコード生成) -->

  <!-- html2canvas: HTML→PNG変換（Brotherラベル印刷用） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- jsQR (カメラQRスキャン用) — CDN優先ロード -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"
    onerror="(function(){var s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js';s.onerror=function(){var s2=document.createElement('script');s2.src='js/vendor/jsQR.min.js';document.head.appendChild(s2);};document.head.appendChild(s);})()">
  </script>
</head>

  <!-- [20260428y6-17] 本セッションでの実装内容反映:
       ・parent_bloodline_extract.js y6.15: 診断機能 + 診断ボタンを画面右上に大きく赤色で表示

         + Brother iPrint&Label でラベル極小印刷問題を修正 (@page size削除) -->
  <script>window.__INDEX_BUILD= '20260428y6-17';console.log("[INDEX_BUILD]",window.__INDEX_BUILD,"loaded");</script>
  <!-- [20260424j] 自己修復: api.js のビルドが古ければ強制リロード
       Android Chrome が index.html を古いままキャッシュした状態で誤って
       開かれるケースの救済。index.html が最新 (20260424j) なのに
       api.js が 20260424i 以前で読まれた = キャッシュずれなので 1 回だけ
       キャッシュ破棄 (location.reload(true) 相当) を行う。
       無限ループ防止に sessionStorage でフラグ管理。 -->
  <script>
  (function(){
    var expected = '20260424i';  // api.js が持つべき最小ビルド
    var actual   = (window.__API_BUILD || '');
    if (actual && actual < expected) {
      if (!sessionStorage.getItem('__hcos_force_reloaded_at_' + window.__INDEX_BUILD)) {
        console.warn('[CACHE] api.js build mismatch. expected>=' + expected + ' / actual=' + actual + ' → force reload');
        sessionStorage.setItem('__hcos_force_reloaded_at_' + window.__INDEX_BUILD, '1');
        // URL にランダムクエリを付けて強制再取得
        var u = new URL(location.href);
        u.searchParams.set('__cb', Date.now());
        location.replace(u.toString());
      } else {
        console.warn('[CACHE] api.js still old after forced reload; cache clear required manually. actual=' + actual);
      }
    }
  })();
  </script>
