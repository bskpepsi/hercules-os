  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <!-- Chart.js (体重推移グラフ) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <!-- html2canvas: HTML→PNG変換（Brotherラベル印刷用） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- jsQR (カメラQRスキャン用) — ローカル最優先・CDNフォールバック -->
  <!-- ★ デプロイ時: https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js を
       vendor/jsQR.min.js としてリポジトリに配置してください -->
  <script>
    (function() {
      // 優先順位: ローカル → jsdelivr → cdnjs → unpkg
      var JSQR_URLS = [
        'vendor/jsQR.min.js',
        'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js',
        'https://unpkg.com/jsqr@1.4.0/dist/jsQR.js'
      ];
      var _idx = 0;
      function loadNext() {
        if (_idx >= JSQR_URLS.length) { window._jsqrLoadFailed = true; return; }
        var s = document.createElement('script');
        s.src = JSQR_URLS[_idx++];
        s.async = false;
        s.onerror = function() { loadNext(); };
        s.onload  = function() { window._jsqrLoaded = true; };
        document.head.appendChild(s);
      }
      loadNext();
    })();
  </script>
</head>
